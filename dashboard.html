<!DOCTYPE html>
<html lang="he">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
    <link rel="stylesheet" href="assets/style.css">
</head>
<body>

    <header class="topbar">
        <h1>Dashboard</h1>
        <div>
            <span id="welcomeMsg"></span>
            <span id="todayDate"></span>
            <a href="transactions.html">כל התנועות</a>
            <a href="manage.html">ניהול</a>
            <button onclick="logout()" class="btn-danger">התנתק</button>
        </div>
    </header>

    <section>
        <div id="balanceBox"></div>
    </section>

    <section>
        <h3>הוסף תנועה</h3>
        <select id="txType" onchange="onTxTypeChange()">
            <option value="expense" selected>הוצאה</option>
            <option value="income">הכנסה</option>
        </select>
        <input  id="txAmount" type="number" step="0.01" placeholder="סכום">
        <input  id="txDate"   type="date">
        <input  id="txDesc"                  placeholder="תיאור (אופציונלי)">
        <select id="txCategory"></select>
        <button onclick="addTransaction()">הוסף</button>
    </section>

    <section>
        <h3>תנועות אחרונות</h3>
        <table border="1" id="transactionsTable">
            <tr>
                <th>תאריך</th>
                <th>סוג</th>
                <th>קטגוריה</th>
                <th>סכום</th>
                <th>תיאור</th>
            </tr>
        </table>
    </section>

    <section>
        <h3>חסכונות</h3>
        <div id="goalsList"></div>
    </section>

    <section>
        <h3>תקציבים חודשיים</h3>
        <div id="budgetsList"></div>
    </section>

    <script src="assets/script.js"></script>
    <script>loadDashboard();</script>
</body>
</html>
